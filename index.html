<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf2f2; margin: 0; padding: 10px; }
        .tab-btn { padding: 10px; border: none; background: #ddd; border-radius: 10px; }
        .tab-btn.active { background: #ff85a2; color: white; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-top: 10px; }
        .admin-form input { display: block; width: 100%; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .hidden { display: none; }
        img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="nav" class="hidden">
        <button id="shop-tab" class="tab-btn active" onclick="switchTab('shop')">Магазин</button>
        <button id="admin-tab" class="tab-btn" onclick="switchTab('admin')">Адмінка ⚙️</button>
    </div>

    <div id="shop-page">
        <h2>Каталог 🐾</h2>
        <div id="product-list"></div>
    </div>

    <div id="admin-page" class="hidden">
        <h2>Додати товар</h2>
        <form id="add-form" class="admin-form">
            <input type="text" name="name" placeholder="Назва товару" required>
            <input type="number" name="price" placeholder="Ціна" required>
            <input type="text" name="category" placeholder="Категорія (КОФТИ, ДЖИНСИ...)" required>
            <label>Фото:</label>
            <input type="file" name="file" accept="image/*" required>
            <button type="button" onclick="uploadProduct()" style="width:100%; background:#4CAF50; color:white; padding:15px; border-radius:10px; border:none;">ЗБЕРЕГТИ ✅</button>
        </form>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        const ADMIN_ID = 6240780160;

        // Показуємо адмінку тільки тобі
        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.id === ADMIN_ID) {
            document.getElementById('nav').classList.remove('hidden');
        }

        function switchTab(tab) {
            if(tab === 'admin') {
                document.getElementById('admin-page').classList.remove('hidden');
                document.getElementById('shop-page').classList.add('hidden');
            } else {
                document.getElementById('admin-page').classList.add('hidden');
                document.getElementById('shop-page').classList.remove('hidden');
                loadProducts();
            }
        }

        async function uploadProduct() {
            const form = document.getElementById('add-form');
            const formData = new FormData(form);
            
            const resp = await fetch('/api/add_product', { method: 'POST', body: formData });
            if(resp.ok) {
                alert("Товар додано!");
                form.reset();
                switchTab('shop');
            }
        }

        async function loadProducts() {
            const resp = await fetch('/api/products');
            const products = await resp.json();
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            products.forEach(p => {
                list.innerHTML += `
                    <div class="card">
                        <img src="${p.photo}">
                        <h3>${p.name}</h3>
                        <p>Ціна: ${p.price} грн | Категорія: ${p.category}</p>
                        <button onclick="order('${p.name}', ${p.price})" style="width:100%; background:#ff85a2; color:white; border:none; padding:10px; border-radius:8px;">ЗАМОВИТИ</button>
                    </div>
                `;
            });
        }

        function order(name, price) {
            // Тепер ми відправляємо дані через бот, але спочатку перевіряємо зв'язок
            tg.sendData(JSON.stringify({product: name, total: price}));
        }

        loadProducts();
    </script>
</body>
</html>
