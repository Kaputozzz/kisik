<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff5f7; padding: 10px; }
        .category-btn { background: white; padding: 15px; margin: 5px; border-radius: 10px; border: 2px solid #ff85a2; cursor: pointer; display: inline-block; width: 44%; text-align: center; font-weight: bold; }
        .hidden { display: none; }
        .product-card { background: white; border-radius: 15px; padding: 15px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; -webkit-user-select: text !important; }
        .btn-buy { background: #ff85a2; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="categories">
        <h2 style="text-align:center; color:#ff85a2;">Оберіть категорію 🐈</h2>
        <div class="category-btn" onclick="showCategory('КОФТИ')">👕 КОФТИ</div>
        <div class="category-btn" onclick="showCategory('ДЖИНСИ')">👖 ДЖИНСИ</div>
        <div class="category-btn" onclick="showCategory('КРОСІВКИ')">👟 КРОСІВКИ</div>
    </div>

    <div id="catalog" class="hidden">
        <button onclick="showCategories()" style="border:none; background:none; color:#ff85a2;">⬅ Назад</button>
        <h3 id="cat-title"></h3>
        <div id="items-list">
            <div class="product-card">
                <img src="https://via.placeholder.com/150" width="100%">
                <h4>Товар категорії</h4>
                <select id="size"><option>S</option><option>M</option><option>L</option></select>
                <input type="text" id="delivery_data" placeholder="ПІБ, Місто, Номер пошти">
                <button class="btn-buy" onclick="sendOrder('Худі', 1200)">Замовити 🐾</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showCategory(name) {
            document.getElementById('categories').classList.add('hidden');
            document.getElementById('catalog').classList.remove('hidden');
            document.getElementById('cat-title').innerText = name;
            // Тут в ідеалі робити запит до бота за товарами цієї категорії
        }

        function showCategories() {
            document.getElementById('categories').classList.remove('hidden');
            document.getElementById('catalog').classList.add('hidden');
        }

        function sendOrder(name, price) {
            const delivery = document.getElementById('delivery_data').value;
            const size = document.getElementById('size').value;

            if(!delivery) { alert("Заповни дані доставки!"); return; }

            const data = {
                product: name,
                total: price,
                size: size,
                delivery: delivery
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
